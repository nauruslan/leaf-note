<style>
    .favorite-btn {
        border: none;
        background: none;
        padding: 0;
        cursor: pointer;
    }

    svg {
        width: 40px;
        height: 40px;
    }

    /* Заливка */
    .star-fill {
        fill: #ffc400;
        fill-opacity: 0;
        transition: fill-opacity 0.35s ease;
    }

    /* Контур */
    .star-stroke {
        fill: none;
        stroke: #b0b0b0; /* серый контур по умолчанию */
        stroke-width: 2;
        stroke-linejoin: round;
        transition: stroke 0.35s ease;
    }

    /* Активное состояние */
    .favorite-btn.active .star-fill {
        fill-opacity: 1; /* плавная заливка */
    }

    .favorite-btn.active .star-stroke {
        stroke: #ffc400; /* контур становится жёлтым */
    }
</style>

<button class="favorite-btn" type="button">
    <svg viewBox="0 0 24 24">
        <!-- Заливка -->
        <path
            class="star-fill"
            d="M12 2.5l2.9 5.88 6.5.95-4.7 4.58 1.1 6.44L12 17.77 6.2 20.35l1.1-6.44-4.7-4.58 6.5-.95L12 2.5z"
        />

        <!-- Контур -->
        <path
            class="star-stroke"
            d="M12 2.5l2.9 5.88 6.5.95-4.7 4.58 1.1 6.44L12 17.77 6.2 20.35l1.1-6.44-4.7-4.58 6.5-.95L12 2.5z"
        />
    </svg>
</button>

<script>
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('.favorite-btn');
        if (!btn) return;
        btn.classList.toggle('active');
    });
</script>
